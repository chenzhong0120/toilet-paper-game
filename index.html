<script>
let count = 0;
let time = 10;
let playing = false;
let boost = 1;
let timer;
let highScore = 0;

let circleTimer = null; // ⭐ 防止疊加

const countEl = document.getElementById("count");
const boostEl = document.getElementById("boost");
const highScoreEl = document.getElementById("highScore");
const tpImage = document.getElementById("tpImage");

const sound = new Audio("sound.mp3");       // ⭐ 音效回來
const bonusSound = new Audio("bonus.mp3");

function startGame(){
  count = 0;
  time = 10;
  boost = 1;
  playing = true;

  countEl.innerText = count;
  boostEl.innerText = "倍率: x1";

  clearInterval(timer);
  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = `時間: ${time}`;
    if(time<=0) endGame();
  },1000);

  // ⭐ 清掉舊的圈圈計時器
  clearInterval(circleTimer);

  spawnCircles();
}

function endGame(){
  playing = false;
  clearInterval(timer);
  clearInterval(circleTimer);

  if(count > highScore){
    highScore = count;
    highScoreEl.innerText = `歷史最高分: ${highScore}`;
  }
}

function addPoint(x, y, value=1){
  count += value;
  countEl.innerText = count;

  // ⭐ 點擊動畫
  countEl.classList.add("click");
  setTimeout(()=>countEl.classList.remove("click"),100);

  // ⭐ 衛生紙動畫（修回來🔥）
  tpImage.src = "21e23f0c-e774-4ad8-8453-87b1cb6c6257.png";
  setTimeout(()=>{
    tpImage.src = "https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180";
  },150);

  // ⭐ 音效
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  // 飄字
  let el = document.createElement("div");
  el.innerText = "+"+value;
  el.className = "addScore";
  el.style.left = x+"px";
  el.style.top = y+"px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),500);

  // 每10次
  if(count % 10 === 0){
    const msgs = ["GOOD","GREAT","EXCELLENT"];
    let i = Math.min(Math.floor(count/10)-1, msgs.length-1);

    let b = document.createElement("div");
    b.innerText = msgs[i];
    b.className = "bonusText";
    b.style.left = x+"px";
    b.style.top = (y-50)+"px";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),700);

    bonusSound.currentTime = 0;
    bonusSound.play().catch(()=>{});
  }
}

/* 左鍵 */
document.addEventListener("click", e=>{
  if(playing){
    addPoint(e.pageX, e.pageY, Math.floor(boost));
    boost = 1;
    boostEl.innerText = "倍率: x1";
  }
});

/* 滾輪 */
document.addEventListener("wheel", e=>{
  if(playing){
    boost = Math.min(boost + 0.2, 3);
    boostEl.innerText = `倍率: x${boost.toFixed(1)}`;
  }
},{passive:false});

/* 禁右鍵 */
document.addEventListener("contextmenu", e=>{
  e.preventDefault();
});

/* ⭐ 固定圈圈 */
function spawnCircles(){

  let list = ["blue","blue","blue","gold"];
  list.sort(()=>Math.random()-0.5);

  let i = 0;

  circleTimer = setInterval(()=>{
    if(i >= list.length || !playing){
      clearInterval(circleTimer);
      return;
    }

    createCircle(list[i]);
    i++;

  },2000);
}

function createCircle(type){
  let c = document.createElement("div");
  c.className = "bonusCircle";

  if(type === "gold"){
    c.classList.add("goldCircle");
  }

  let x = Math.random()*(window.innerWidth-80);
  let y = Math.random()*(window.innerHeight-80);

  c.style.left = x+"px";
  c.style.top = y+"px";

  document.body.appendChild(c);

  setTimeout(()=>c.remove(),3000);

  c.addEventListener("contextmenu", e=>{
    e.preventDefault();
    e.stopPropagation();

    if(type === "gold"){
      addPoint(x,y,10);
    }else{
      addPoint(x,y,5);
    }

    bonusSound.currentTime = 0;
    bonusSound.play().catch(()=>{});

    c.remove();
  });
}
</script>
