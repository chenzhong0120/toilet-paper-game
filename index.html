<title>滾筒衛生紙遊戲</title>
<style>
  body {
    user-select: none;  /* 不可選文字 */
    -webkit-user-select: none; /* Safari/Chrome */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE */
    background: url("https://tse3.mm.bing.net/th/id/OIP.GnfwG69yyUEeitBhqpbj-AHaEK?pid=Api&P=0&h=180") no-repeat center center fixed;
    background-size: cover;
    font-family: 'Comic Sans MS', sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  
  /* 標題美化 */
  #gameTitle {
    font-size: 50px;
    background: linear-gradient(90deg, #ff8c00, #ffa500, #ff4500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    margin-top: 20px;
    transition: transform 0.3s;
  }

  #count {
    font-size: 60px;
    margin: 20px 0;
    transition: transform 0.1s, color 0.2s;
  }

  #count.click {
    transform: scale(1.5);
    color: #ff6347;
  }

  #timer {
    font-size: 30px;
    margin-bottom: 20px;
  }

  #result {
    font-size: 30px;
    margin: 20px 0;
    color: #006400;
  }

  button {
    font-size: 20px;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff8c00, #ffa500);
    color: white;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    transition: transform 0.1s;
    margin: 5px;
  }

  button:hover {
    transform: scale(1.1);
  }

  #tpImage {
    width: 150px;
    margin-top: 20px;
    transition: transform 0.1s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  @keyframes pullDown {
    0% { transform: translateY(0); }
    50% { transform: translateY(30px); }
    100% { transform: translateY(0); }
  }

  #tpImage.pull {
    animation: pullDown 0.3s;
  }

  #highScore {
    font-size: 28px;
    font-weight: bold;
    color: #ff4500;
    margin-top: 15px;
    transition: transform 0.3s;
  }

  #highScore.flash {
    transform: scale(1.3);
  }
  .addScore {
    position: absolute;
    font-weight: bold;
    color: #ffdd00;
    text-shadow: 2px 2px 4px #000;
    pointer-events: none;
    animation: floatUp 0.5s forwards;
    font-size: 30px;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { transform: translateY(-25px) scale(1.3); }
    100% { opacity: 0; transform: translateY(-50px) scale(1); }
  }

  .bonusText {
    position: absolute;
    font-weight: bold;
    color: #00ffff;
    text-shadow: 2px 2px 4px #000;
    pointer-events: none;
    font-size: 36px;
    animation: floatUp 0.8s forwards;
  }
</style>
</head>

<body>

<img id="bonusTime" src="https://img.lovepik.com/free-png/20210918/lovepik-clock-png-image_400227948_wh1200.png" 
style="width:80px; position:absolute; display:none; cursor:pointer;">
  
<h1 id="gameTitle">滾筒衛生紙挑戰</h1>
<img id="tpImage" src="https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180" alt="衛生紙">
<div id="highScore">歷史最高分: 0</div>

<div id="timer">時間: 10 秒</div>
<div id="count">0</div>
<div id="result"></div>

<button id="startBtn">點我開始遊戲</button>
<button onclick="startGame()">再玩一次</button>

<audio id="sound" src="sound.mp3"></audio>

<script>
// 🔴 每次重整清除歷史分數
localStorage.removeItem('tpHighScore');

let count = 0;
let time = 10;
let playing = false;
let timerInterval;
let highScore = 0; // 因為重整清零
document.getElementById("highScore").innerText = `歷史最高分: ${highScore}`;

const countEl = document.getElementById("count");
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const sound = document.getElementById("sound");
const tpImg = document.getElementById("tpImage");
const highScoreEl = document.getElementById("highScore");
const startBtn = document.getElementById("startBtn");
const gameTitle = document.getElementById("gameTitle");
const bonusTime = document.getElementById("bonusTime");
let bonusActive = false;

startBtn.addEventListener("click", () => {
  sound.play().catch(e => console.log("音效播放失敗:", e));
  startGame();
  startBtn.style.display = "none";
});

function startGame() {
  count = 0;
  time = 10;
  playing = true;
  countEl.innerText = count;
  resultEl.innerText = '';
  timerEl.innerText = `時間: ${time} 秒`;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    time--;
    timerEl.innerText = `時間: ${time} 秒`;
    if(time <= 0){
      endGame();
    spawnBonus();
    }
  }, 1000);
}

function endGame() {
  playing = false;
  clearInterval(timerInterval);
  const cps = (count / 10).toFixed(2);
  resultEl.innerText = `你拉了 ${count} 張！手速 ${cps} CPS`;
  
function spawnBonus(){
  setInterval(() => {
    if(!playing) return;

    // 20% 機率出現
    if(Math.random() < 0.2 && !bonusActive){

      bonusActive = true;

      // 隨機位置
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);

      bonusTime.style.left = x + 'px';
      bonusTime.style.top = y + 'px';
      bonusTime.style.display = 'block';

      // 1秒後消失（沒點到就沒了）
      setTimeout(() => {
        bonusTime.style.display = 'none';
        bonusActive = false;
      }, 1000);
    }

  }, 1500); // 每1.5秒檢查一次
}

bonusTime.addEventListener("contextmenu", function(e){
  e.preventDefault(); // ❗防止右鍵選單跳出

  if(!playing) return;

  time += 3; // 加3秒
  timerEl.innerText = `時間: ${time} 秒`;

  // 特效
  let timeEl = document.createElement('div');
  timeEl.innerText = '+3秒';
  timeEl.className = 'bonusText';
  timeEl.style.left = bonusTime.style.left;
  timeEl.style.top = bonusTime.style.top;
  document.body.appendChild(timeEl);

  setTimeout(() => timeEl.remove(), 800);

  bonusTime.style.display = 'none';
  bonusActive = false;
});
  
  // 破紀錄特效
  if(count > highScore){
    highScore = count;
    highScoreEl.innerText = `歷史最高分: ${highScore}`;
    highScoreEl.classList.add("flash");
    gameTitle.style.transform = "scale(1.3)";

    let bonusEl = document.createElement('div');
    bonusEl.innerText = '🎉 新紀錄！ 🎉';
    bonusEl.className = 'bonusText';
    bonusEl.style.left = '50%';
    bonusEl.style.top = '50%';
    bonusEl.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(bonusEl);

    // 延長新紀錄特效停留時間到 2 秒
    setTimeout(() => {
        highScoreEl.classList.remove("flash");
        gameTitle.style.transform = "scale(1)";
        bonusEl.remove();
    }, 2000);
  }
}

document.addEventListener("contextmenu", function(e){
  if(playing) e.preventDefault();
});
  
// 點擊事件
document.addEventListener("click", function(e){
  if(playing){
    count++;
    countEl.innerText = count;

    // 點擊動畫
    countEl.classList.add("click");
    setTimeout(() => countEl.classList.remove("click"), 100);

    // 衛生紙拉出動畫
    tpImg.classList.add("pull");
    tpImg.src = "21e23f0c-e774-4ad8-8453-87b1cb6c6257.png";
    setTimeout(() => {
      tpImg.src = "https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180";
      tpImg.classList.remove("pull");
    }, 300); 

    // +1 飄字
    let addEl = document.createElement('div');
    addEl.innerText = '+1';
    addEl.className = 'addScore';
    addEl.style.left = `${e.pageX}px`;
    addEl.style.top = `${e.pageY}px`;
    document.body.appendChild(addEl);
    setTimeout(() => addEl.remove(), 500);

    // 每10的倍數特效 (漸進式文字)
    if(count % 10 === 0){
      const messages = ['GOOD!', 'GREAT!', 'EXCELLENT!', 'AWESOME!', 'AMAZING!'];
      let index = Math.min(Math.floor(count / 10) - 1, messages.length - 1);
      let text = messages[index];

      countEl.style.color = '#00ffff';
      countEl.style.transform = 'scale(2)';

      let bonusEl = document.createElement('div');
      bonusEl.innerText = text;
      bonusEl.className = 'bonusText';
      bonusEl.style.left = `${e.pageX}px`;
      bonusEl.style.top = `${e.pageY - 50}px`;
      document.body.appendChild(bonusEl);

      setTimeout(() => {
          countEl.style.color = '#000';
          countEl.style.transform = 'scale(1)';
          bonusEl.remove();
      }, 800);
    }

    // 播放音效
    sound.currentTime = 0;
    sound.play().catch(e => console.log("音效播放失敗:", e));
  }
});
</script>

</body>
