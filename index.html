<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>滾筒衛生紙遊戲</title>
<style>
  body {
    background: url("https://tse3.mm.bing.net/th/id/OIP.GnfwG69yyUEeitBhqpbj-AHaEK?pid=Api&P=0&h=180") no-repeat center center fixed;
    background-size: cover;
    font-family: 'Comic Sans MS', sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  /* 遊戲標題美化 */
  #gameTitle {
    font-size: 50px;
    background: linear-gradient(90deg, #ff8c00, #ffa500, #ff4500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    margin-top: 20px;
  }

  #count {
    font-size: 60px;
    margin: 20px 0;
    transition: transform 0.1s, color 0.2s;
  }

  #count.click {
    transform: scale(1.5);
    color: #ff6347;
  }

  #timer {
    font-size: 30px;
    margin-bottom: 20px;
  }

  #result {
    font-size: 30px;
    margin: 20px 0;
    color: #006400;
  }

  button {
    font-size: 20px;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff8c00, #ffa500);
    color: white;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    transition: transform 0.1s;
    margin: 5px;
  }

  button:hover {
    transform: scale(1.1);
  }

  #tpImage {
    width: 150px;
    margin-top: 20px;
    transition: transform 0.1s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  @keyframes pullDown {
    0% { transform: translateY(0); }
    50% { transform: translateY(30px); }
    100% { transform: translateY(0); }
  }

  #tpImage.pull {
    animation: pullDown 0.15s;
  }

  #highScore {
    font-size: 28px;
    font-weight: bold;
    color: #ff4500;
    margin-top: 15px;
    transition: transform 0.3s;
  }

  #highScore.flash {
    transform: scale(1.3);
  }

  .addScore {
    position: absolute;
    font-weight: bold;
    color: #ff4500;
    pointer-events: none;
    animation: floatUp 0.5s forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-50px); }
  }
</style>
</head>
<body>

<h1 id="gameTitle">滾筒衛生紙挑戰</h1>
<img id="tpImage" src="https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180" alt="衛生紙">
<div id="highScore">歷史最高分: 0</div>

<div id="timer">時間: 10 秒</div>
<div id="count">0</div>
<div id="result"></div>

<button id="startBtn">點我開始遊戲</button>
<button onclick="startGame()">再玩一次</button>

<audio id="sound" src="sound.mp3"></audio>

<script>
let count = 0;
let time = 10;
let playing = false;
let timerInterval;
let highScore = localStorage.getItem('tpHighScore') || 0;
document.getElementById("highScore").innerText = `歷史最高分: ${highScore}`;

const countEl = document.getElementById("count");
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const sound = document.getElementById("sound");
const tpImg = document.getElementById("tpImage");
const highScoreEl = document.getElementById("highScore");
const startBtn = document.getElementById("startBtn");

// 開始遊戲按鈕
startBtn.addEventListener("click", () => {
  sound.play().catch(e => console.log("音效播放失敗:", e)); 
  startGame();
  startBtn.style.display = "none"; 
});

function startGame() {
  count = 0;
  time = 10;
  playing = true;
  countEl.innerText = count;
  resultEl.innerText = '';
  timerEl.innerText = `時間: ${time} 秒`;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    time--;
    timerEl.innerText = `時間: ${time} 秒`;
    if(time <= 0){
      endGame();
    }
  }, 1000);
}

function endGame() {
  playing = false;
  clearInterval(timerInterval);
  const cps = (count / 10).toFixed(2);
  resultEl.innerText = `你拉了 ${count} 張！手速 ${cps} CPS`;

  if(count > highScore){
    highScore = count;
    localStorage.setItem('tpHighScore', highScore);
    highScoreEl.innerText = `歷史最高分: ${highScore}`;
    highScoreEl.classList.add("flash");
    setTimeout(() => highScoreEl.classList.remove("flash"), 300);
  }
}

// 點擊衛生紙事件
document.addEventListener("click", function(e){
  if(playing){
    count++;
    countEl.innerText = count;

    // 點擊動畫
    countEl.classList.add("click");
    setTimeout(() => countEl.classList.remove("click"), 100);

    // 衛生紙拉出動畫
    tpImg.classList.add("pull");
    tpImg.src = "21e23f0c-e774-4ad8-8453-87b1cb6c6257.png";  
    setTimeout(() => {
      tpImg.src = "https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180";
      tpImg.classList.remove("pull");
    }, 300);

    // 飄字 +1
    let addEl = document.createElement('div');
    addEl.innerText = '+1';
    addEl.className = 'addScore';
    addEl.style.left = `${e.pageX}px`;
    addEl.style.top = `${e.pageY}px`;
    document.body.appendChild(addEl);
    setTimeout(() => addEl.remove(), 500);

    // 播放音效
    sound.currentTime = 0;
    sound.play().catch(e => console.log("音效播放失敗:", e));
  }
});
</script>

</body>
</html>
