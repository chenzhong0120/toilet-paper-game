<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>滾筒衛生紙遊戲</title>

<style>
body {
  background: url("https://tse3.mm.bing.net/th/id/OIP.GnfwG69yyUEeitBhqpbj-AHaEK?pid=Api&P=0&h=180") no-repeat center center fixed;
  background-size: cover;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
  user-select: none;
}

#gameTitle {
  font-size: 50px;
  background: linear-gradient(90deg, #ff8c00, #ffa500, #ff4500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: bold;
  margin-top: 20px;
}

#count {
  font-size: 60px;
  margin: 20px 0;
  transition: transform 0.1s;
}

#count.click {
  transform: scale(1.3);
  color: #ff4500;
}

#timer {
  font-size: 30px;
}

#highScore {
  font-size: 28px;
  font-weight: bold;
  color: #ff4500;
  margin-top: 15px;
}

button {
  font-size: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, orange, gold);
  color: white;
  cursor: pointer;
  margin: 5px;
}

#tpImage {
  width: 150px;
  margin-top: 20px;
}

.addScore {
  position: absolute;
  font-size: 35px;
  font-weight: bold;
  color: yellow;
  text-shadow: 2px 2px 4px black;
  pointer-events: none;
  animation: floatUp 0.5s forwards;
}

.bonusText {
  position: absolute;
  font-size: 38px;
  font-weight: bold;
  color: cyan;
  text-shadow: 2px 2px 4px black;
  pointer-events: none;
  animation: floatUp 0.7s forwards;
}

@keyframes floatUp {
  0% { opacity:1; transform: translateY(0); }
  100% { opacity:0; transform: translateY(-50px); }
}

#boost {
  font-size: 24px;
  color: cyan;
}
</style>
</head>

<body>

<h1 id="gameTitle">滾筒衛生紙挑戰</h1>
<img id="tpImage" src="https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180">

<div id="highScore">歷史最高分: 0</div>
<div id="timer">時間: 10 秒</div>
<div id="count">0</div>
<div id="boost">倍率: x1</div>
<div id="result"></div>

<button onclick="startGame()">開始遊戲</button>

<audio id="sound" src="sound.mp3"></audio>
<audio id="bonusSound" src="bonus.mp3"></audio>

<script>
localStorage.removeItem('tpHighScore');

let count = 0;
let time = 10;
let playing = false;
let boost = 1;
let timer;
let highScore = 0;

const countEl = document.getElementById("count");
const boostEl = document.getElementById("boost");
const highScoreEl = document.getElementById("highScore");
const bonusSound = document.getElementById("bonusSound");

function startGame(){
  count = 0;
  time = 10;
  boost = 1;
  playing = true;

  countEl.innerText = count;
  boostEl.innerText = "倍率: x1";
  document.getElementById("result").innerText = "";

  clearInterval(timer);
  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = `時間: ${time}`;
    if(time<=0) endGame();
  },1000);
}

function endGame(){
  playing = false;
  clearInterval(timer);

  const cps = (count / 10).toFixed(2);
  document.getElementById("result").innerText = `你拉了 ${count} 張！手速 ${cps} CPS`;

  if(count > highScore){
    highScore = count;
    highScoreEl.innerText = `歷史最高分: ${highScore}`;
  }
}

function addPoint(x, y, value=1){
  count += value;
  countEl.innerText = count;

  // 點擊動畫
  countEl.classList.add("click");
  setTimeout(()=>countEl.classList.remove("click"),100);

  // 飄字
  let el = document.createElement("div");
  el.innerText = "+"+value;
  el.className = "addScore";
  el.style.left = x+"px";
  el.style.top = y+"px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),500);

  // 每10特效
  if(count % 10 === 0){
    const messages = ['GOOD!', 'GREAT!', 'EXCELLENT!', 'AWESOME!', 'AMAZING!'];
    let index = Math.min(Math.floor(count/10)-1, messages.length-1);

    let b = document.createElement("div");
    b.innerText = messages[index];
    b.className = "bonusText";
    b.style.left = x+"px";
    b.style.top = (y-50)+"px";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),700);

    bonusSound.currentTime = 0;
    bonusSound.play();
  }
}

// 左鍵（主輸出🔥）
document.addEventListener("click", e=>{
  if(playing){
    let gain = Math.floor(boost);
    addPoint(e.pageX, e.pageY, gain);
    boost = 1;
    boostEl.innerText = "倍率: x1";
  }
});

// 滾輪（充能）
document.addEventListener("wheel", e=>{
  e.preventDefault();
  if(playing){
    boost = Math.min(boost + 0.5, 3);
    boostEl.innerText = `倍率: x${boost.toFixed(1)}`;
  }
},{passive:false});

// 右鍵（輔助）
document.addEventListener("contextmenu", e=>{
  e.preventDefault();
  if(playing){
    addPoint(e.pageX, e.pageY, 2);
  }
});
</script>

</body>
</html>
