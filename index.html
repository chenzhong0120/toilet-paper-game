<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>滾筒衛生紙遊戲</title>
<style>
  body {
    background: url("https://tse3.mm.bing.net/th/id/OIP.GnfwG69yyUEeitBhqpbj-AHaEK?pid=Api&P=0&h=180") no-repeat center center fixed;
    background-size: cover;
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    user-select: none;
  }

  #gameTitle {
    font-size: 50px;
    background: linear-gradient(90deg, orange, red);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #tpImage {
    width: 150px;
    margin-top: 20px;
  }

  #count {
    font-size: 60px;
    margin: 20px;
  }

  .addScore, .bonusText {
    position: absolute;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 0.6s forwards;
  }

  .addScore {
    color: yellow;
    text-shadow: 2px 2px 4px black;
    font-size: 30px;
  }

  .bonusText {
    color: cyan;
    font-size: 36px;
  }

  @keyframes floatUp {
    0% {opacity:1; transform:translateY(0);}
    100% {opacity:0; transform:translateY(-60px);}
  }
</style>
</head>

<body>

<h1 id="gameTitle">滾筒衛生紙挑戰</h1>
<img id="tpImage" src="https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180">
<div id="highScore">歷史最高分: 0</div>

<div id="timer">時間: 10 秒</div>
<div id="count">0</div>
<div id="result"></div>

<button onclick="startGame()">開始遊戲</button>

<audio id="sound" src="sound.mp3"></audio>
<audio id="bonusSound" src="bonus.mp3"></audio>

<script>
localStorage.removeItem('tpHighScore');

let count = 0;
let time = 10;
let playing = false;
let timer;

const countEl = document.getElementById("count");
const tpImg = document.getElementById("tpImage");
const bonusSound = document.getElementById("bonusSound");

function startGame(){
  count = 0;
  time = 10;
  playing = true;
  countEl.innerText = count;

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = `時間: ${time}`;
    if(time<=0) clearInterval(timer);
  },1000);
}

function addPoint(x, y, value=1){
  count += value;
  countEl.innerText = count;

  // 飄字
  let el = document.createElement("div");
  el.innerText = "+"+value;
  el.className = "addScore";
  el.style.left = x+"px";
  el.style.top = y+"px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),600);

  // 圖片動畫
  tpImg.style.transform = "translateY(20px)";
  setTimeout(()=>tpImg.style.transform="translateY(0)",100);

  // 每10特效
  if(count % 10 === 0){
    let msgs = ["GOOD","GREAT","EXCELLENT","AWESOME","AMAZING"];
    let idx = Math.min(Math.floor(count/10)-1, msgs.length-1);

    let b = document.createElement("div");
    b.innerText = msgs[idx];
    b.className = "bonusText";
    b.style.left = x+"px";
    b.style.top = (y-50)+"px";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),800);

    bonusSound.currentTime = 0;
    bonusSound.play();
  }
}

// 左鍵
document.addEventListener("click", e=>{
  if(playing) addPoint(e.pageX, e.pageY, 1);
});

// 右鍵（弱技能）
document.addEventListener("contextmenu", e=>{
  e.preventDefault();
  if(playing) addPoint(e.pageX, e.pageY, 2);
});

// 滾輪（主玩法🔥）
document.addEventListener("wheel", e=>{
  e.preventDefault();

  if(playing){
    let power = Math.min(Math.abs(e.deltaY)/50,5);
    let gain = Math.floor(power) || 1;

    if(e.deltaY > 0){
      addPoint(window.innerWidth/2, window.innerHeight/2, gain);
    }
  }
},{passive:false});

</script>

</body>
</html>
