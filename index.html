<title>滾筒衛生紙遊戲</title>
<style>
  body {
    user-select: none;  /* 不可選文字 */
    -webkit-user-select: none; /* Safari/Chrome */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE */
    background: url("https://tse3.mm.bing.net/th/id/OIP.GnfwG69yyUEeitBhqpbj-AHaEK?pid=Api&P=0&h=180") no-repeat center center fixed;
    background-size: cover;
    font-family: 'Comic Sans MS', sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  
  /* 標題美化 */
  #gameTitle {
    font-size: 50px;
    background: linear-gradient(90deg, #ff8c00, #ffa500, #ff4500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    margin-top: 20px;
    transition: transform 0.3s;
  }

  #count {
    font-size: 60px;
    margin: 20px 0;
    transition: transform 0.1s, color 0.2s;
  }

  #count.click {
    transform: scale(1.5);
    color: #ff6347;
  }

  #timer {
    font-size: 30px;
    margin-bottom: 20px;
  }

  #result {
    font-size: 30px;
    margin: 20px 0;
    color: #006400;
  }

  button {
    font-size: 20px;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff8c00, #ffa500);
    color: white;
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    transition: transform 0.1s;
    margin: 5px;
  }

  button:hover {
    transform: scale(1.1);
  }

  #tpImage {
    width: 150px;
    margin-top: 20px;
    transition: transform 0.1s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  @keyframes pullDown {
    0% { transform: translateY(0); }
    50% { transform: translateY(30px); }
    100% { transform: translateY(0); }
  }

  #tpImage.pull {
    animation: pullDown 0.3s;
  }

  #highScore {
    font-size: 28px;
    font-weight: bold;
    color: #ff4500;
    margin-top: 15px;
    transition: transform 0.3s;
  }

  #highScore.flash {
    transform: scale(1.3);
  }
  .addScore {
    position: absolute;
    font-weight: bold;
    color: #ffdd00;
    text-shadow: 2px 2px 4px #000;
    pointer-events: none;
    animation: floatUp 0.5s forwards;
    font-size: 30px;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { transform: translateY(-25px) scale(1.3); }
    100% { opacity: 0; transform: translateY(-50px) scale(1); }
  }

  .bonusText {
    position: absolute;
    font-weight: bold;
    color: #00ffff;
    text-shadow: 2px 2px 4px #000;
    pointer-events: none;
    font-size: 36px;
    animation: floatUp 0.8s forwards;
  }
</style>
</head>

<body>
  
<h1 id="gameTitle">滾筒衛生紙挑戰</h1>
<img id="tpImage" src="https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180" alt="衛生紙">
<div id="highScore">歷史最高分: 0</div>

<div id="timer">時間: 10 秒</div>
<div id="count">0</div>
<div id="result"></div>

<button id="startBtn">點我開始遊戲</button>
<button onclick="startGame()">再玩一次</button>

<audio id="sound" src="sound.mp3"></audio>

<script>
localStorage.removeItem('tpHighScore');

let count = 0;
let time = 10;
let playing = false;
let timerInterval;
let highScore = 0;
let bonusBtnActive = false; // 目前是否有加時按鈕在畫面上

const pullImages = [
  "994D3E39-1FC8-4BC2-B43D-1405D662D00E.png",
  "output.png",
  "994D3E39-1FC8-4BC2-B43D-1405D662D00E.png",
];
let pullIndex = 0;
  
document.getElementById("highScore").innerText = `歷史最高分: ${highScore}`;

const countEl = document.getElementById("count");
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const sound = document.getElementById("sound");
const tpImg = document.getElementById("tpImage");
const highScoreEl = document.getElementById("highScore");
const startBtn = document.getElementById("startBtn");
const gameTitle = document.getElementById("gameTitle");

startBtn.addEventListener("click", () => {
  sound.play().catch(e => console.log("音效播放失敗:", e));
  startGame();
  startBtn.style.display = "none";
});

function startGame() {
  count = 0;
  time = 10;
  playing = true;
  bonusBtnActive = false;
  countEl.innerText = count;
  resultEl.innerText = '';
  timerEl.innerText = `時間: ${time} 秒`;
  timerEl.style.color = '';

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    time--;
    timerEl.innerText = `時間: ${time} 秒`;

    // 時間快到時變紅警示
    if(time <= 3) timerEl.style.color = '#ff2222';
    else timerEl.style.color = '';

    if(time <= 0) endGame();
  }, 1000);

  // 5秒後開始隨機生成加時按鈕
  setTimeout(spawnBonusBtn, 5000);
}

function endGame() {
  playing = false;
  clearInterval(timerInterval);
  const cps = (count / 10).toFixed(2);
  resultEl.innerText = `你拉了 ${count} 張！手速 ${cps} CPS`;

  if(count > highScore){
    highScore = count;
    highScoreEl.innerText = `歷史最高分: ${highScore}`;
    highScoreEl.classList.add("flash");
    gameTitle.style.transform = "scale(1.3)";

    let bonusEl = document.createElement('div');
    bonusEl.innerText = '🎉 新紀錄！ 🎉';
    bonusEl.className = 'bonusText';
    bonusEl.style.left = '50%';
    bonusEl.style.top = '50%';
    bonusEl.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(bonusEl);

    setTimeout(() => {
      highScoreEl.classList.remove("flash");
      gameTitle.style.transform = "scale(1)";
      bonusEl.remove();
    }, 2000);
  }
}

// ======= 左鍵點擊 拉衛生紙 =======
document.addEventListener("click", function(e){
  if(!playing) return;
  count++;
  countEl.innerText = count;

  countEl.classList.add("click");
  setTimeout(() => countEl.classList.remove("click"), 100);

tpImg.classList.add("pull");
tpImg.src = pullImages[pullIndex % pullImages.length];
pullIndex++;
setTimeout(() => {
  tpImg.src = "Lovepik_com-401649264-toilet-paper-pumping.png";
  tpImg.classList.remove("pull");
}, 300);
  
  let addEl = document.createElement('div');
  addEl.innerText = '+1';
  addEl.className = 'addScore';
  addEl.style.left = `${e.pageX}px`;
  addEl.style.top = `${e.pageY}px`;
  document.body.appendChild(addEl);
  setTimeout(() => addEl.remove(), 500);

  if(count % 10 === 0){
    const messages = ['GOOD!', 'GREAT!', 'EXCELLENT!', 'AWESOME!', 'AMAZING!'];
    let index = Math.min(Math.floor(count / 10) - 1, messages.length - 1);

    countEl.style.color = '#00ffff';
    countEl.style.transform = 'scale(2)';

    let bonusEl = document.createElement('div');
    bonusEl.innerText = messages[index];
    bonusEl.className = 'bonusText';
    bonusEl.style.left = `${e.pageX}px`;
    bonusEl.style.top = `${e.pageY - 50}px`;
    document.body.appendChild(bonusEl);

    setTimeout(() => {
      countEl.style.color = '#000';
      countEl.style.transform = 'scale(1)';
      bonusEl.remove();
    }, 800);
  }

  sound.currentTime = 0;
  sound.play().catch(e => console.log("音效播放失敗:", e));
});

// ======= 右鍵：只有加時按鈕出現時才有效 =======
document.addEventListener("contextmenu", function(e){
  e.preventDefault();
  if(!playing || !bonusBtnActive) return;

  // 找到畫面上的加時按鈕並觸發
  let btn = document.getElementById("bonusBtn");
  if(btn) btn.click();
});

// ======= 滾輪：向下扣分懲罰 =======
document.addEventListener("wheel", function(e){
  if(!playing) return;
  if(e.deltaY > 0){
    count = Math.max(0, count - 1);
    countEl.innerText = count;

    let el = document.createElement('div');
    el.innerText = '-1';
    el.className = 'addScore';
    el.style.left = `${window.innerWidth / 2}px`;
    el.style.top = `${window.innerHeight / 2}px`;
    el.style.color = '#ff4444';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 500);
  }
});

// ======= 隨機加時按鈕（左鍵或右鍵皆可點） =======
function spawnBonusBtn(){
  if(!playing || bonusBtnActive) return;

  bonusBtnActive = true;

  let btn = document.createElement('button');
  btn.id = 'bonusBtn';
  btn.innerText = '';  // 清空文字
  btn.style.background = 'none';
  btn.style.border = 'none';
  btn.style.boxShadow = 'none';
  btn.style.padding = '0';
  btn.style.width = '80px';
  btn.style.height = '80px';

let img = document.createElement('img');
img.src = 'lovepik-clock-png-image_400227948_wh1200.png';  // 👈 改這裡
img.style.width = '80px';
img.style.height = '80px';
img.style.cursor = 'pointer';
img.style.filter = 'drop-shadow(0 0 10px rgba(255,180,0,0.9))';
img.style.animation = 'floatUp 2s infinite alternate';
btn.appendChild(img);

  // 2秒倒數條
  let bar = document.createElement('div');
  bar.style.cssText = `
    position: fixed;
    left: ${btn.style.left};
    top: calc(${btn.style.top} + 45px);
    width: 160px;
    height: 6px;
    background: #ddd;
    border-radius: 4px;
    z-index: 9999;
    overflow: hidden;
  `;
  let fill = document.createElement('div');
  fill.style.cssText = 'width:100%;height:100%;background:#ff8c00;transition:width 2s linear;';
  bar.appendChild(fill);
  document.body.appendChild(bar);
  setTimeout(() => fill.style.width = '0%', 50);

  let removeBtn = () => {
    btn.remove();
    bar.remove();
    bonusBtnActive = false;
    // 下次 5~9 秒後再出現
    if(playing){
      let next = (Math.random() * 4 + 5) * 1000;
      setTimeout(spawnBonusBtn, next);
    }
  };

  // 點擊加時（左鍵）
  btn.addEventListener("click", function(ev){
    ev.stopPropagation();
    time += 5;
    timerEl.innerText = `時間: ${time} 秒`;

    let el = document.createElement('div');
    el.innerText = '⚡ +5秒！';
    el.className = 'bonusText';
    el.style.left = ev.pageX + 'px';
    el.style.top = ev.pageY + 'px';
    el.style.color = '#ffaa00';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);

    removeBtn();
  });

  // 2秒後自動消失
  setTimeout(removeBtn, 2000);
}
  
</script>

</body>
