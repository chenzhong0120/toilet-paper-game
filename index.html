<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>滾筒衛生紙遊戲</title>
<style>
  body {
    background: url("https://tse3.mm.bing.net/th/id/OIP.GnfwG69yyUEeitBhqpbj-AHaEK?pid=Api&P=0&h=180") no-repeat center center fixed;
    background-size: cover;
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
  }

  h1 {
    margin-top: 20px;
    color: #333;
    font-size: 50px;
    text-shadow: 2px 2px 5px #fff;
  }

  #highScore {
    font-size: 30px;
    margin-bottom: 10px;
    color: #006400;
    text-shadow: 1px 1px 2px #fff;
  }

  #count {
    font-size: 60px;
    margin: 20px 0;
    transition: transform 0.1s;
    position: relative;
  }

  #count.click {
    transform: scale(1.3);
    color: #ff4500;
  }

  #timer {
    font-size: 30px;
    margin-bottom: 20px;
  }

  #result {
    font-size: 30px;
    margin: 20px 0;
    color: #006400;
  }

  button {
    font-size: 20px;
    padding: 10px 20px;
    cursor: pointer;
  }

  #tpImage {
    width: 150px;
    margin-top: 20px;
  }

  .bonusCircle {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #00ffff, #0088ff);
    box-shadow: 0 0 15px #00ffff;
    cursor: pointer;
    animation: pulse 1s infinite;
    z-index: 1000;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .bonusText {
    position: absolute;
    font-size: 24px;
    font-weight: bold;
    color: gold;
    text-shadow: 1px 1px 3px #000;
    pointer-events: none;
    z-index: 1100;
  }
</style>
</head>
<body>

<h1>滾筒衛生紙挑戰</h1>
<div id="highScore">歷史最高分: 0</div>
<img id="tpImage" src="https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180" alt="衛生紙">

<div id="timer">時間: 10 秒</div>
<div id="count">0</div>
<div id="result"></div>
<button id="startBtn">點我開始遊戲</button>
<button onclick="startGame()">再玩一次</button>

<audio id="sound" src="sound.mp3"></audio>
<audio id="bonusSound" src="bonus.mp3"></audio>

<script>
let count = 0;
let time = 10;
let playing = false;
let timerInterval;
let highScore = 0;
let boost = 1;

const countEl = document.getElementById("count");
const timerEl = document.getElementById("timer");
const resultEl = document.getElementById("result");
const sound = document.getElementById("sound");
const bonusSound = document.getElementById("bonusSound");
const startBtn = document.getElementById("startBtn");
const tpImage = document.getElementById("tpImage");
const highScoreEl = document.getElementById("highScore");

highScoreEl.innerText = `歷史最高分: ${highScore}`;

startBtn.addEventListener("click", () => {
  sound.play().catch(e => console.log("音效播放失敗:", e));
  startGame();
  startBtn.style.display = "none";
});

function startGame() {
  count = 0;
  time = 10;
  playing = true;
  boost = 1;
  countEl.innerText = count;
  resultEl.innerText = '';
  timerEl.innerText = `時間: ${time} 秒`;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    time--;
    timerEl.innerText = `時間: ${time} 秒`;
    if(time <= 0){
      endGame();
    }
  }, 1000);

  setInterval(spawnCircle, 3000);
}

function endGame() {
  playing = false;
  clearInterval(timerInterval);
  const cps = (count / 10).toFixed(2);
  resultEl.innerText = `你拉了 ${count} 張！手速 ${cps} CPS`;

  if(count > highScore){
    highScore = count;
    highScoreEl.innerText = `歷史最高分: ${highScore}`;
    showBonusText(window.innerWidth/2, window.innerHeight/2, "新紀錄!!!", 1500);
  }
}

function addPoint(x,y,val){
  count += val;
  countEl.innerText = count;

  if(count % 10 === 0){
    showBonusText(x,y, ["GOOD","GREAT","EXCELLENT"][Math.min(count/10-1,2)]);
    bonusSound.currentTime = 0;
    bonusSound.play().catch(e=>console.log(e));
  }
}

function showBonusText(x,y,text,dur=800){
  let t = document.createElement("div");
  t.className = "bonusText";
  t.innerText = text;
  t.style.left = x + "px";
  t.style.top = y + "px";
  document.body.appendChild(t);
  setTimeout(()=> t.remove(), dur);
}

document.addEventListener("click", e=>{
  if(playing){
    let gain = Math.floor(boost);
    addPoint(e.pageX,e.pageY,gain);

    countEl.classList.add("click");
    setTimeout(() => countEl.classList.remove("click"), 100);

    tpImage.src = "21e23f0c-e774-4ad8-8453-87b1cb6c6257.png";
    setTimeout(()=> tpImage.src = "https://tse4.mm.bing.net/th/id/OIP.JDTCmZzsc_j0FAy_C6KrJgHaHa?pid=Api&P=0&h=180",150);

    sound.currentTime = 0;
    sound.play().catch(e => console.log("音效播放失敗:", e));
  }
});

// 滾輪充能
document.addEventListener("wheel", e=>{
  if(playing){
    boost = Math.min(boost + 0.1,3);
  }
});

// 禁用右鍵選單
document.addEventListener("contextmenu", e=>{
  e.preventDefault();
});

// BONUS圈圈 (右鍵點擊才能拿)
function spawnCircle(){
  if(!playing) return;
  let circle = document.createElement("div");
  circle.className = "bonusCircle";
  let x = Math.random() * (window.innerWidth - 80);
  let y = Math.random() * (window.innerHeight - 80);
  circle.style.left = x + "px";
  circle.style.top = y + "px";
  document.body.appendChild(circle);

  setTimeout(()=> circle.remove(),3000);

  circle.addEventListener("contextmenu", e=>{
    e.preventDefault();
    e.stopPropagation();
    addPoint(x,y,5);
    showBonusText(x,y,"BONUS!");
    bonusSound.currentTime=0; bonusSound.play().catch(e=>console.log(e));
    circle.remove();
  });
}
</script>

</body>
</html>
